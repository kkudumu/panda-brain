---
name: ftm-capture
description: Extract reusable routines, playbooks, and reference docs from the current session's work. Reads session context (blackboard, daily log, tool history), asks clarifying questions about generalizability, then writes to all three ftm knowledge layers (~/.ftm/routines/, ~/.claude/ftm-ops/playbooks/, ~/Documents/Code/panda/docs/playbooks/). Use when user says "capture this", "save this as a routine", "make a playbook from this", "ftm capture", "codify this", "turn this into a routine", "extract the pattern", "save what we did", or after completing a repeatable workflow that should be reusable. Also triggers on "learn from this", "remember how to do this", "don't make me explain this again".
---
