name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate skill files
        run: |
          chmod +x tests/validate-skills.sh
          tests/validate-skills.sh

      - name: Validate eval files
        run: |
          chmod +x tests/validate-evals.sh
          tests/validate-evals.sh

      - name: Check for hardcoded paths
        run: |
          if grep -r '/Users/[a-zA-Z]' --include="*.md" --include="*.sh" --include="*.json" --include="*.yml" --include="*.ts" . | grep -v node_modules | grep -v '.git/' | grep -v 'docs/plans/' | grep -v CONTRIBUTING.md | grep -v CHANGELOG.md; then
            echo "FAIL: Found hardcoded user home paths"
            exit 1
          else
            echo "OK: No hardcoded paths found"
          fi

      - name: Validate JSON files
        run: |
          FAIL=0
          for f in $(find . -name "*.json" -not -path "*/node_modules/*" -not -path "*/.git/*" -not -path "*/bun.lock"); do
            if ! node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" 2>/dev/null; then
              echo "FAIL: $f is not valid JSON"
              FAIL=1
            fi
          done
          exit $FAIL

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck on scripts
        run: |
          FAIL=0
          for f in $(find . -name "*.sh" -not -path "*/node_modules/*"); do
            echo "Checking: $f"
            if ! shellcheck -S warning "$f"; then
              FAIL=1
            fi
          done
          exit $FAIL

  manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate manifest
        run: node bin/generate-manifest.mjs

      - name: Check manifest is up to date
        run: git diff --exit-code ftm-manifest.json

  commitlint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install commitlint
        run: npm install --no-save @commitlint/cli @commitlint/config-conventional

      - name: Lint commit messages
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  validate-events:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Validate event registry
        run: node tests/validate-events.mjs

  validate-tsc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: TypeScript check for ftm-browse daemon
        run: npx tsc --noEmit --project ftm-browse/daemon/tsconfig.json

  validate-blackboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Validate blackboard files against schemas
        run: node tests/validate-blackboard.mjs

  typecheck-browse:
    name: TypeScript Check (ftm-browse)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install browse daemon dependencies
        working-directory: ftm-browse/daemon
        run: bun install
      - name: TypeScript check
        working-directory: ftm-browse/daemon
        run: bun run tsc --noEmit

  validate-frontmatter:
    name: Validate Skill Frontmatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check frontmatter
        run: bash tests/structural/test-skill-frontmatter.sh

  validate-event-crossrefs:
    name: Validate Event Registry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cross-validate events
        run: bash tests/structural/test-event-crossrefs.sh

  validate-schemas:
    name: Validate JSON Schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate schemas and data
        run: bash tests/structural/test-json-schemas.sh

  check-hardcoded-paths:
    name: No Hardcoded Paths
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for hardcoded paths
        run: bash tests/structural/test-no-hardcoded-paths.sh

  validate-manifest-drift:
    name: Manifest Drift Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Regenerate manifest
        run: node bin/generate-manifest.mjs
      - name: Check for drift
        run: |
          if ! git diff --exit-code ftm-manifest.json; then
            echo "ERROR: ftm-manifest.json is out of date. Run 'npm run generate-manifest' and commit."
            exit 1
          fi

  test-runtime:
    name: Runtime Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run ftm-runtime tests
        run: node tests/runtime/test-ftm-runtime.mjs
