# FTM Skills Configuration
# Edit this file or use /ftm-config to modify settings

# Model profiles control which model is used at each stage
# Options: opus, sonnet, haiku, inherit (use session default)
profile: balanced  # quality | balanced | budget | custom | inherit

profiles:
  quality:
    planning: opus      # brainstorm, research, plan generation
    execution: opus     # agent task implementation
    review: sonnet      # audit, debug review, council synthesis

  balanced:
    planning: opus
    execution: sonnet
    review: sonnet

  budget:
    planning: sonnet
    execution: sonnet
    review: haiku

  inherit:
    planning: inherit
    execution: inherit
    review: inherit

  custom:
    planning: opus
    execution: sonnet
    review: haiku

# Execution preferences
execution:
  agent_mode: bypassPermissions   # permission mode for ALL spawned agents
                                  # options: bypassPermissions, acceptEdits, dontAsk, default, auto
  max_parallel_agents: 5          # max agents dispatched simultaneously
  per_skill_overrides:              # skills read their own override, fall back to global
    ftm-researcher: 10
    ftm-executor: 8
    ftm-debug: 6
    ftm-brainstorm: 3              # fallback if researcher unavailable
  auto_audit: true                # run ftm-audit after each executor task
  progress_tracking: true         # write PROGRESS.md during execution
  approval_mode: plan_first       # plan_first | always_ask
                                  #   plan_first: every task gets a plan, micro tasks get inline plans
                                  #   always_ask: always present full plan, even for micro tasks
  tdd_mode: false               # when true, agents must write tests before implementation
                                 # spec reviewer enforces RED-GREEN-REFACTOR compliance

# Two-stage review — runs after each task agent completes, before ftm-audit
review:
  spec_reviewer_model: haiku    # fast, cheap — checks spec compliance only
  quality_reviewer_model: opus  # thorough — checks code quality and bug risk
  skip_quality_review: false    # set true to run spec review only (faster execution)

# Skill enable/disable — set enabled: false to prevent ftm-mind from routing to a skill
skills:
  ftm-brainstorm: { enabled: true }
  ftm-executor: { enabled: true }
  ftm-debug: { enabled: true }
  ftm-audit: { enabled: true }
  ftm-council: { enabled: true }
  ftm-codex-gate: { enabled: true }
  ftm-intent: { enabled: true }
  ftm-diagram: { enabled: true }
  ftm-browse: { enabled: true }
  ftm-pause: { enabled: true }
  ftm-resume: { enabled: true }
  ftm-upgrade: { enabled: true }
  ftm-retro: { enabled: true }
  ftm-config: { enabled: true }
  ftm-git: { enabled: true }
  ftm-mind: { enabled: true }
  ftm-researcher: { enabled: true }   # deep parallel research engine
  ftm-map: { enabled: true }          # persistent code knowledge graph
  ftm-ops: { enabled: true }          # personal operations intelligence

# Operations intelligence settings (merged from eng-buddy)
ops:
  personality_style: supportive-direct  # supportive-direct | formal | casual

  mcp_account_rules:
    personal: mcp-atlassian-personal    # for user actions (comments, ticket updates)
    admin: mcp-atlassian                # for admin/global operations only
    default: personal                    # always use personal unless explicitly admin

  approval_gates:
    communication_drafts: always        # always | auto | never — require approval before sending comms
    task_status_changes: auto           # always | auto | never — Jira/ticket status changes
    capacity_alerts: auto               # always | auto | never — when to surface capacity warnings

  context_loading:
    strategy: smart                     # smart | full | minimal
    max_daily_files: 3                  # max daily files to load at once
    grep_first: true                    # always grep index before loading full files
    session_snapshot_on_cold_start: true # load last session snapshot if today's daily is sparse

  alert_thresholds:
    capacity_warning: 90               # percentage
    capacity_alert: 100                # percentage
    context_switches_warning: 20       # per week
    oncall_incidents_warning: 3        # per week
    weekend_work: true                 # alert on any weekend work
    weekly_hours_warning: 45           # hours per week, alert if exceeded 2 weeks running
    recurring_issue_threshold: 2       # times in 30 days before alerting
    recurring_question_threshold: 3    # times before suggesting documentation

  drafts:
    directory: ~/.claude/ftm-ops/drafts/  # where communication drafts are stored
    naming: "[recipient]-[topic]-[YYYY-MM-DD].md"
    write_before_display: true         # always write file before showing draft in chat

# Paths configuration — override for team distribution
paths:
  brain_py: bin/brain.py                    # relative to skill install dir, or absolute
  ops_data_dir: ~/.claude/ftm-ops/          # base directory for ops data (daily/, weekly/, patterns/, etc.)
  drafts_dir: ~/.claude/ftm-ops/drafts/     # communication drafts
  inbox_db: ~/.claude/ftm-ops/inbox.db      # SQLite database for ops tables

# Session management
session:
  auto_pause_on_exit: false       # automatically save state when conversation ends
  state_retention_days: 7         # archive states older than this
